<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Gaming Hub - Start Here</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 700px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 15px;
        }
        
        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        
        .apps-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .app-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .app-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .app-card h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        
        .app-card p {
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
            font-size: 0.95em;
        }
        
        .app-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Welcome to Gaming Hub</h1>
        <p>Choose an app to get started:</p>
        
        <div class="apps-grid">
            <a href="index.html" class="app-card">
                <div class="app-icon">🎮</div>
                <h2>Gaming Hub</h2>
                <p>Play 50+ games across 5 categories</p>
            </a>
            
            <a href="todo-app/index.html" class="app-card">
                <div class="app-icon">📝</div>
                <h2>To-Do List</h2>
                <p>Manage tasks with local storage</p>
            </a>
            
            <a href="world-clock/index.html" class="app-card">
                <div class="app-icon">🕐</div>
                <h2>World Clock</h2>
                <p>Track time across time zones</p>
            </a>
        </div>
    </div>
</body>
</html>
