<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 To-Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My To-Do List</h1>
            <p>Stay organized and productive</p>
        </header>

        <div class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">➕ Add</button>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterTasks('all')">All</button>
                <button class="filter-btn" onclick="filterTasks('active')">Active</button>
                <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
            </div>
        </div>

        <div class="stats">
            <span>Total: <strong id="totalCount">0</strong></span>
            <span>Active: <strong id="activeCount">0</strong></span>
            <span>Completed: <strong id="completedCount">0</strong></span>
        </div>

        <ul id="taskList" class="task-list">
            <!-- Tasks will be added here -->
        </ul>

        <div id="emptyState" class="empty-state">
            <p>📭 No tasks yet. Add one to get started!</p>
        </div>

        <div class="actions">
            <button id="clearCompletedBtn" class="clear-btn">🗑️ Clear Completed</button>
            <button id="clearAllBtn" class="clear-all-btn">❌ Clear All</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
